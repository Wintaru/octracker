name: Update Character Profile

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6am UTC
  workflow_dispatch:       # Allow manual runs

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch character data from Lodestone
        run: python3 scripts/fetch_character.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add character.json
          if git diff --cached --quiet; then
            echo "No changes to character.json"
          else
            git commit -m "Update character profile from Lodestone"
            git push
          fi
